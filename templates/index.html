<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QyShare Keeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
</head>
<body class="bg-slate-900 text-slate-200 p-4">
    <div class="max-w-5xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-emerald-400"><i class="fa-solid fa-robot mr-2"></i> QyShare Smart Keeper</h1>
            <a href="/api/trigger" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded text-xs font-bold">⚡ Force Check</a>
        </div>

        <div class="bg-slate-800 p-5 rounded-xl mb-8 border border-slate-700 shadow-lg">
            <form action="/api/add" method="POST" class="flex gap-2">
                <textarea name="url" rows="2" class="w-full bg-slate-900 border border-slate-600 rounded p-3 text-xs text-green-300 focus:outline-none focus:border-emerald-500" placeholder="Paste links here (One per line)..."></textarea>
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white px-6 rounded-lg font-bold text-sm whitespace-nowrap">Add</button>
            </form>
        </div>

        <div class="bg-slate-800 rounded-xl overflow-hidden border border-slate-700">
            <table class="w-full text-left text-xs">
                <thead class="bg-slate-900 text-slate-500">
                    <tr>
                        <th class="p-4">File Name / URL</th>
                        <th class="p-4">Last Checked</th>
                        <th class="p-4">Status</th>
                        <th class="p-4 text-right">Action</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-slate-700">
                    {% for l in links %}
                    <tr class="hover:bg-slate-700/30">
                        <td class="p-4">
                            <div class="font-bold text-slate-100">{{ l.name }}</div>
                            <div class="text-[10px] text-slate-500 truncate max-w-xs">{{ l.url }}</div>
                        </td>
                        <td class="p-4 text-slate-400">{{ l.last_check or 'Pending...' }}</td>
                        <td class="p-4 font-bold">{{ l.status }}</td>
                        <td class="p-4 text-right">
                            <a href="/api/delete/{{ l.id }}" class="text-red-400 hover:text-red-300"><i class="fa-solid fa-trash"></i></a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
